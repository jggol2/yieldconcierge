<svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <rect width="120" height="120" fill="#09090f"/>

  <!-- Outer square frame with corner accents -->
  <rect x="10" y="10" width="100" height="100" fill="none" stroke="#c8a96e" stroke-width="1.5" rx="3"/>
  <circle cx="10" cy="10" r="3" fill="#c8a96e"/>
  <circle cx="110" cy="10" r="3" fill="#c8a96e"/>
  <circle cx="10" cy="110" r="3" fill="#c8a96e"/>
  <circle cx="110" cy="110" r="3" fill="#c8a96e"/>

  <!-- Axis lines (faint) -->
  <line x1="24" y1="96" x2="98" y2="96" stroke="#c8a96e" stroke-width="0.75" opacity="0.22"/>
  <line x1="24" y1="24" x2="24" y2="96" stroke="#c8a96e" stroke-width="0.75" opacity="0.22"/>

  <!-- Yield curve -->
  <path d="M 24 92 C 30 58 60 32 98 22" fill="none" stroke="#c8a96e" stroke-width="3" stroke-linecap="round"/>

  <!-- Start dot -->
  <circle cx="24" cy="92" r="3" fill="none" stroke="#c8a96e" stroke-width="1.5" opacity="0.5"/>
  <!-- End dot (the optimal yield point) -->
  <circle cx="98" cy="22" r="6" fill="#c8a96e"/>
</svg>
