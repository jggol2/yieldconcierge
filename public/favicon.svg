<svg width="480" height="120" viewBox="0 0 480 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,400&amp;family=DM+Mono:wght@400&amp;display=swap');
    </style>
  </defs>

  <rect width="480" height="120" fill="#09090f"/>

  <!-- Mark: square frame with corner accents -->
  <rect x="16" y="10" width="100" height="100" fill="none" stroke="#c8a96e" stroke-width="1" rx="2"/>
  <circle cx="16" cy="10" r="2.5" fill="#c8a96e"/>
  <circle cx="116" cy="10" r="2.5" fill="#c8a96e"/>
  <circle cx="16" cy="110" r="2.5" fill="#c8a96e"/>
  <circle cx="116" cy="110" r="2.5" fill="#c8a96e"/>

  <!-- Axis lines (faint) -->
  <line x1="28" y1="98" x2="106" y2="98" stroke="#c8a96e" stroke-width="0.5" opacity="0.22"/>
  <line x1="28" y1="22" x2="28" y2="98" stroke="#c8a96e" stroke-width="0.5" opacity="0.22"/>

  <!-- Yield curve -->
  <path d="M 28 94 C 34 62 62 36 106 24" fill="none" stroke="#c8a96e" stroke-width="2.25" stroke-linecap="round"/>

  <!-- Start dot -->
  <circle cx="28" cy="94" r="2.5" fill="none" stroke="#c8a96e" stroke-width="1" opacity="0.45"/>
  <!-- End dot (high yield point) -->
  <circle cx="106" cy="24" r="4.5" fill="#c8a96e"/>

  <!-- Vertical divider -->
  <line x1="148" y1="18" x2="148" y2="102" stroke="#c8a96e" stroke-width="0.75" opacity="0.28"/>

  <!-- "Yield" wordmark -->
  <text x="170" y="82"
        font-family="'Cormorant Garamond', Georgia, 'Times New Roman', serif"
        font-style="italic"
        font-weight="400"
        font-size="58"
        fill="#ddd8ce"
        letter-spacing="-0.5">Yield</text>

  <!-- "CONCIERGE" submark -->
  <text x="173" y="103"
        font-family="'DM Mono', 'Courier New', Courier, monospace"
        font-size="11"
        fill="#c8a96e"
        letter-spacing="6">CONCIERGE</text>
</svg>
